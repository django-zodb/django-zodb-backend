name: Django Test Suite

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -eux {0}

jobs:
  test:
    name: Django Test Suite (ZODB)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout django-zodb-backend
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install django-zodb-backend
        run: pip install -e .

      - name: Checkout Django (django-zodb fork)
        uses: actions/checkout@v4
        with:
          repository: django-zodb/django
          ref: zodb-6.0.x
          path: django_repo
          persist-credentials: false

      - name: Install Django and its Python test dependencies
        run: |
          cd django_repo/tests/
          pip install -e ..
          pip install -r requirements/py3.txt

      - name: Copy test settings and runner
        run: |
          cp .github/workflows/zodb_settings.py django_repo/tests/
          cp .github/workflows/runtests.py django_repo/tests/runtests_.py

      - name: Run tests
        run: python django_repo/tests/runtests_.py

    permissions:
      contents: read

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check django_zodb_backend/
    permissions:
      contents: read
