name: Django Test Suite

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -eux {0}

# ── Why matrix sharding? ──────────────────────────────────────────────────────
# Django's test suite has ~146 apps. Running them sequentially (as
# django-mongodb-backend does) takes 60–90 min. We split the app list
# across 8 parallel shards, each passing its subset to a single runtests.py
# invocation with --parallel. Result: ~8–12 min on CI.
#
# ZODB's in-memory MappingStorage is a further advantage: no external service
# (mongod, postgres, etc.) needs to start — each shard gets its own fresh
# in-memory DB with zero startup overhead.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  test:
    name: "Tests (shard ${{ matrix.shard }}/8, py${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # let all shards finish so we see the full picture
      matrix:
        python-version: ["3.12", "3.13"]
        shard: [0, 1, 2, 3, 4, 5, 6, 7]

    steps:
      - name: Checkout django-zodb-backend
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install django-zodb-backend
        run: pip install -e .

      - name: Checkout Django (django-zodb fork)
        uses: actions/checkout@v4
        with:
          repository: django-zodb/django
          ref: zodb-6.0.x
          path: django_repo
          persist-credentials: false

      - name: Install Django and its Python test dependencies
        run: |
          cd django_repo/tests/
          pip install -e ..
          pip install -r requirements/py3.txt

      - name: Copy test settings and runner
        run: |
          cp .github/workflows/zodb_settings.py django_repo/tests/
          cp .github/workflows/runtests.py django_repo/tests/runtests_.py

      - name: Run shard ${{ matrix.shard }}
        env:
          DJANGO_TEST_SHARD: ${{ matrix.shard }}
          DJANGO_TEST_SHARDS: 8
        run: python django_repo/tests/runtests_.py

    permissions:
      contents: read

  # ── Summary job ─────────────────────────────────────────────────────────────
  # Required status check: passes only when all shards pass.
  tests-complete:
    name: Tests complete
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          result="${{ needs.test.result }}"
          if [[ "$result" == "success" ]]; then
            echo "All shards passed."
          else
            echo "One or more shards failed (result: $result)."
            exit 1
          fi
    permissions:
      contents: read

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check django_zodb_backend/
    permissions:
      contents: read

  # ── ZEO-specific tests ───────────────────────────────────────────────────
  # Run as a separate job because each test starts an in-process ZEO server
  # (asyncio event-loop spin-up ~10-15s per test), so the suite takes ~2 min.
  # Kept isolated so it never blocks or delays the main sharded matrix.
  test-zeo:
    name: "ZEO storage tests (py${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-zeo-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install django-zodb-backend with ZEO extras
        run: pip install -e ".[zeo]"

      - name: Run ZEO tests
        run: python -m pytest tests/test_zeo.py -v --timeout=300

    permissions:
      contents: read
